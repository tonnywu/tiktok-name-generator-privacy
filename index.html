<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTokアカウント名生成ツール - ホーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #FF0050 0%, #000000 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #FF0050;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .app-icon {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            margin: 30px auto;
            background: linear-gradient(135deg, #FF0050, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }
        .link-btn {
            display: block;
            padding: 18px 30px;
            background: linear-gradient(135deg, #FF0050, #FF3366);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,0,80,0.3);
        }
        .link-btn.secondary {
            background: #f5f5f5;
            color: #333;
        }
        .link-btn.secondary:hover {
            background: #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #888;
            font-size: 0.9em;
        }
        .footer a {
            color: #FF0050;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">✨</div>
        <h1>TikTokアカウント名生成ツール</h1>
        <p>AIが瞬時にTikTokで映えるアカウント名を生成します</p>
        
        <div class="links">
            <a href="privacy-policy.html" class="link-btn">プライバシーポリシー</a>
            <a href="terms-of-service.html" class="link-btn">利用規約</a>
            <a href="https://www.tiktok.com" target="_blank" class="link-btn secondary">TikTokを開く ↗</a>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 TikTokアカウント名生成ツール. All rights reserved.</p>
            <p><a href="privacy-policy.html">プライバシーポリシー</a> | <a href="terms-of-service.html">利用規約</a></p>
        </div>
    </div>
</body>
</html>
